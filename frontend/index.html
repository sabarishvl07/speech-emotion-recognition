<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Emotion Recognition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: background 1s ease;
        }

        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 650px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #e94560;
            background: rgba(233,69,96,0.05);
        }

        .upload-area input { display: none; }
        .upload-icon { font-size: 3rem; margin-bottom: 10px; }

        .upload-text {
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
        }

        .btn {
            background: linear-gradient(90deg, #e94560, #c23152);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .result {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: none;
        }

        .emotion-label {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: capitalize;
            margin: 10px 0;
        }

        .emotion-icons { font-size: 3rem; margin: 10px 0; }

        .status {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            margin-top: 5px;
            margin-bottom: 20px;
        }

        .file-name {
            color: #e94560;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        /* Bar Chart */
        .chart-title {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 15px;
            text-align: left;
        }

        .bar-container {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-label {
            width: 80px;
            text-align: right;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            text-transform: capitalize;
        }

        .bar-wrap {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            height: 22px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 50px;
            transition: width 1s ease;
            width: 0%;
        }

        .bar-score {
            width: 45px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Speech Emotion Recognition</h1>
        <p class="subtitle">Upload a voice recording to detect the emotion</p>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">🎤</div>
            <div class="upload-text">Click to upload a .wav audio file</div>
            <input type="file" id="fileInput" accept=".wav" onchange="handleFile(event)">
            <div class="file-name" id="fileName"></div>
        </div>

        <button class="btn" id="predictBtn" onclick="predict()" disabled>
            Analyze Emotion
        </button>

        <div class="result" id="result">
            <div class="emotion-icons" id="emotionIcon"></div>
            <div class="emotion-label" id="emotionLabel"></div>
            <div class="status">Emotion detected successfully!</div>
            <div class="chart-title">Confidence scores for all emotions:</div>
            <div id="barChart"></div>
        </div>
    </div>

    <script>
        const emotionIcons = {
            angry: "😠", calm: "😌", happy: "😊",
            sad: "😢", fearful: "😨", disgust: "🤢",
            surprised: "😲", neutral: "😐"
        };

        const emotionColors = {
            angry: "#e94560",
            calm: "#4ecdc4",
            happy: "#ffe66d",
            sad: "#4a90d9",
            fearful: "#9b59b6",
            disgust: "#2ecc71",
            surprised: "#f39c12",
            neutral: "#95a5a6"
        };

        const emotionBg = {
            angry: "linear-gradient(135deg, #3a0a0a, #6b1a1a, #8b0000)",
            calm: "linear-gradient(135deg, #0a2a2a, #1a4a4a, #006060)",
            happy: "linear-gradient(135deg, #2a2a00, #4a4a00, #6b6b00)",
            sad: "linear-gradient(135deg, #0a0a3a, #1a1a6b, #00008b)",
            fearful: "linear-gradient(135deg, #1a0a2a, #3a1a5a, #4b0082)",
            disgust: "linear-gradient(135deg, #0a2a0a, #1a4a1a, #006400)",
            surprised: "linear-gradient(135deg, #2a1a00, #4a3000, #8b4500)",
            neutral: "linear-gradient(135deg, #1a1a2e, #16213e, #0f3460)"
        };

        let selectedFile = null;

        function handleFile(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                document.getElementById("fileName").textContent = selectedFile.name;
                document.getElementById("predictBtn").disabled = false;
            }
        }

        function renderBarChart(scores, topEmotion) {
            const chart = document.getElementById("barChart");
            chart.innerHTML = "";

            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);

            sorted.forEach(([emotion, score]) => {
                const color = emotionColors[emotion] || "#e94560";
                const isTop = emotion === topEmotion;

                chart.innerHTML += `
                    <div class="bar-container">
                        <div class="bar-label" style="${isTop ? 'font-weight:bold;color:white;' : ''}">${emotion}</div>
                        <div class="bar-wrap">
                            <div class="bar-fill" id="bar-${emotion}" style="background:${color};opacity:${isTop ? '1' : '0.5'}"></div>
                        </div>
                        <div class="bar-score">${score.toFixed(1)}%</div>
                    </div>`;
            });

            setTimeout(() => {
                sorted.forEach(([emotion, score]) => {
                    const bar = document.getElementById(`bar-${emotion}`);
                    if (bar) bar.style.width = score + "%";
                });
            }, 100);
        }

        async function predict() {
            if (!selectedFile) return;

            const btn = document.getElementById("predictBtn");
            btn.textContent = "Analyzing...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", selectedFile);

            try {
              const response = await fetch("https://speech-emotion-recognition-dd7d.onrender.com/predict", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                const emotion = data.emotion;
                const scores = data.confidence_scores;

                // Update emotion display
                document.getElementById("emotionIcon").textContent = emotionIcons[emotion] || "🎭";
                document.getElementById("emotionLabel").textContent = emotion;
                document.getElementById("result").style.display = "block";

                // Update background color
                document.body.style.background = emotionBg[emotion] || emotionBg.neutral;

                // Render bar chart
                renderBarChart(scores, emotion);

            } catch (error) {
                alert("Error connecting to API. Make sure the backend is running!");
            }

            btn.textContent = "Analyze Emotion";
            btn.disabled = false;
        }
    </script>
</body>
</html>
